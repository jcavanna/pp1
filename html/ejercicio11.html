<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Formulario de registro - Mi web</title>
  </head>
  <body>
    <h1>Formulario de registro</h1>
    <form action="" method="get">
      <p>
        <label for="nombre">Nombre:</label>
        <input type="text" id="nombre" name="nombre" maxlength="50" />
      </p>

      <p>
        <label for="apellido">Apellido:</label>
        <input type="text" id="apellido" name="apellido" maxlength="50" />
      </p>

      <p>
        Sexo:
        <input type="radio" name="sexo" id="masculino" value="masculino" />
        <label for="masculino">Masculino</label>
        <input type="radio" name="sexo" id="femenino" value="femenino" />
        <label for="femenino">Femenino</label>
        <input type="radio" name="sexo" id="no-binario" value="no-binario" />
        <label for="no-binario">No binario</label>
      </p>

      <p>
        <label for="estadocivil">Estado civil:</label>
        <select name="estadocivil" id="estadocivil">
          <option value="soltero">Soltero</option>
          <option value="casado">Casado</option>
          <option value="divorciado">Divorciado</option>
        </select>
      </p>

      <p>
        <input type="checkbox" id="novedades" name="novedades" value="si" checked />
        <label for="novedades">Deseo recibir informacion sobre novedades y ofertas</label>
      </p>

      <p>
        <input type="checkbox" id="condiciones" name="condiciones" value="si" />
        <label for="condiciones"
          >Declaro haber leido y aceptar las condiciones generales del programa y la normativa sobre proteccio de
          datos</label
        >
      </p>

      <p>
        <input type="submit" value="Enviar" />
      </p>
    </form>
  </body>
</html>
